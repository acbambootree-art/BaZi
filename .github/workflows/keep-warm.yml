name: Keep Render service warm

# Render's free tier sleeps the service after ~15 min of inactivity, causing a
# slow cold start on the next request. This pings a lightweight endpoint on a
# schedule so the instance stays awake during the day.

on:
  schedule:
    - cron: '*/10 * * * *'   # every 10 minutes (GitHub may delay during high load)
  workflow_dispatch:          # allow manual runs

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping payment-config endpoint
        run: |
          for i in 1 2 3; do
            code=$(curl -s -o /dev/null -m 40 -w "%{http_code}" https://bazi-calculator-oqnl.onrender.com/api/payment-config || echo "000")
            echo "Attempt $i -> HTTP $code"
            if [ "$code" = "200" ]; then exit 0; fi
            sleep 15
          done
          echo "Service did not return 200 after retries (may still be waking)."
          exit 0
