services:
  - type: web
    name: bazi-calculator
    runtime: node
    plan: starter
    buildCommand: cd server && npm install
    startCommand: cd server && node server.js
    # Persistent disk so the orders/users SQLite DB survives deploys & restarts.
    disk:
      name: bazi-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM_EMAIL
        value: onboarding@resend.dev
      - key: VERIFICATION_BASE_URL
        sync: false
      - key: PUBLIC_BASE_URL
        sync: false
      - key: DB_PATH
        value: /var/data/bazi.db
      # Focused Decision Reading — paid one-question readings
      - key: ORDER_NOTIFY_EMAIL
        value: cj@360nightnday.com
      - key: PAYNOW_MOBILE
        value: "+6580108950"
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      # Admin orders dashboard at /admin.html — set a long random secret
      - key: ADMIN_KEY
        sync: false
