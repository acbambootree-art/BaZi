BZ.copyChart = function() {
  const chart = BZ._lastChart;
  if (!chart) return;

  const S = i => BZ.STEMS[i];
  const B = i => BZ.BRANCHES[i];
  const p = (si, bi) => S(si).zh + B(bi).zh + ' (' + S(si).en + ' ' + B(bi).en + ')';
  const elLabel = i => S(i).pol === 'yang' ? 'Yang' : 'Yin';

  let text = `BaZi Chart Data\n${'='.repeat(50)}\n`;
  text += `Birth: ${chart.birthYear}-${String(chart.birthMonth).padStart(2,'0')}-${String(chart.birthDay).padStart(2,'0')}`;
  if (chart.hour) text += `, ${B(chart.hour.branchIdx).zh}时`;
  text += `, ${chart.gender === 'male' ? 'Male' : 'Female'}\n\n`;

  text += `FOUR PILLARS:\n`;
  text += `Year:  ${p(chart.year.stemIdx, chart.year.branchIdx)} - ${elLabel(chart.year.stemIdx)} ${BZ.EL_EN[S(chart.year.stemIdx).el]} / ${B(chart.year.branchIdx).animal}\n`;
  text += `Month: ${p(chart.month.stemIdx, chart.month.branchIdx)} - ${elLabel(chart.month.stemIdx)} ${BZ.EL_EN[S(chart.month.stemIdx).el]} / ${B(chart.month.branchIdx).animal}\n`;
  text += `Day:   ${p(chart.day.stemIdx, chart.day.branchIdx)} - ${elLabel(chart.day.stemIdx)} ${BZ.EL_EN[S(chart.day.stemIdx).el]} / ${B(chart.day.branchIdx).animal} [DAY MASTER]\n`;
  if (chart.hour) {
    text += `Hour:  ${p(chart.hour.stemIdx, chart.hour.branchIdx)} - ${elLabel(chart.hour.stemIdx)} ${BZ.EL_EN[S(chart.hour.stemIdx).el]} / ${B(chart.hour.branchIdx).animal}\n`;
  }

  text += `\nDAY MASTER: ${S(chart.day.stemIdx).zh} (${S(chart.day.stemIdx).en}) - ${elLabel(chart.day.stemIdx)} ${BZ.EL_EN[S(chart.day.stemIdx).el]}\n`;
  text += `Strength: ${chart.strength.strength} (score: ${chart.strength.score})\n`;
  text += `Favorable: ${chart.strength.favorable.map(e => BZ.EL_ZH[e] + ' ' + BZ.EL_EN[e]).join(', ')}\n`;
  text += `Unfavorable: ${chart.strength.unfavorable.map(e => BZ.EL_ZH[e] + ' ' + BZ.EL_EN[e]).join(', ')}\n`;

  text += `\nTEN GODS:\n`;
  text += `Year Stem (${S(chart.year.stemIdx).zh}): ${BZ.tenGod(chart.day.stemIdx, chart.year.stemIdx)} ${BZ.tenGodShort(BZ.tenGod(chart.day.stemIdx, chart.year.stemIdx))}\n`;
  text += `Month Stem (${S(chart.month.stemIdx).zh}): ${BZ.tenGod(chart.day.stemIdx, chart.month.stemIdx)} ${BZ.tenGodShort(BZ.tenGod(chart.day.stemIdx, chart.month.stemIdx))}\n`;
  if (chart.hour) {
    text += `Hour Stem (${S(chart.hour.stemIdx).zh}): ${BZ.tenGod(chart.day.stemIdx, chart.hour.stemIdx)} ${BZ.tenGodShort(BZ.tenGod(chart.day.stemIdx, chart.hour.stemIdx))}\n`;
  }

  text += `\nHIDDEN STEMS:\n`;
  const pillarsForHidden = [
    { name: 'Year', brIdx: chart.year.branchIdx },
    { name: 'Month', brIdx: chart.month.branchIdx },
    { name: 'Day', brIdx: chart.day.branchIdx },
  ];
  if (chart.hour) pillarsForHidden.push({ name: 'Hour', brIdx: chart.hour.branchIdx });
  for (const ph of pillarsForHidden) {
    const hs = BZ.HIDDEN[ph.brIdx];
    const hsStr = hs.map(si => {
      const tg = BZ.tenGod(chart.day.stemIdx, si);
      return `${S(si).zh}(${tg})`;
    }).join(' ');
    text += `${ph.name} (${B(ph.brIdx).zh}): ${hsStr}\n`;
  }

  if (chart.interactions.length > 0) {
    text += `\nINTERACTIONS:\n`;
    for (const int of chart.interactions) {
      text += `- ${int.typeZh} ${int.typeEn}: ${int.branches.join('')} (${int.pillars.join('-')})${int.result ? ' -> ' + BZ.EL_EN[int.result] : ''}\n`;
    }
  }

  if (chart.shensha.length > 0) {
    text += `\nSHEN SHA STARS:\n`;
    for (const s of chart.shensha) {
      text += `- ${s.zh} (${s.en}) in ${s.pillar} Pillar\n`;
    }
  }

  text += `\n10-YEAR LUCK PILLARS (${chart.luckPillars.forward ? 'Forward' : 'Backward'}, starts age ${chart.luckPillars.startAge}):\n`;
  for (const lp of chart.luckPillars.pillars) {
    const s = S(lp.stemIdx);
    const b = B(lp.branchIdx);
    text += `Age ${String(lp.ageStart).padStart(2)}-${String(lp.ageEnd).padStart(2)}: ${s.zh}${b.zh} (${s.en} ${b.en}) - ${s.pol === 'yang' ? 'Yang' : 'Yin'} ${BZ.EL_EN[s.el]} / ${b.animal}\n`;
  }

  const cy = chart.currentYear;
  text += `\nCURRENT YEAR ${cy.year}: ${S(cy.stemIdx).zh}${B(cy.branchIdx).zh} (${S(cy.stemIdx).en} ${B(cy.branchIdx).en}) - ${B(cy.branchIdx).animal}\n`;

  // Copy to clipboard
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.querySelector('.copy-section .btn');
    btn.textContent = 'Copied!';
    setTimeout(() => { btn.textContent = 'Copy Chart Data for AI Analysis'; }, 2000);
  }).catch(() => {
    // Show the text for manual copy
    document.getElementById('copy-output').style.display = 'block';
    document.getElementById('copy-text').textContent = text;
  });
};

// ============================================================
// APP INIT
// ============================================================
BZ.init = function() {
  // Year dropdown
  const selYear = document.getElementById('sel-year');
  const currentYear = new Date().getFullYear();
  for (let y = currentYear + 10; y >= 1920; y--) {
    const opt = document.createElement('option');
    opt.value = y; opt.textContent = y;
    if (y === 1990) opt.selected = true;
    selYear.appendChild(opt);
  }

  // Month dropdown
  const selMonth = document.getElementById('sel-month');
  const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  for (let m = 1; m <= 12; m++) {
    const opt = document.createElement('option');
    opt.value = m; opt.textContent = `${m} - ${months[m-1]}`;
    selMonth.appendChild(opt);
  }

  // Day dropdown
  BZ.updateDays();
  selYear.addEventListener('change', BZ.updateDays);
  selMonth.addEventListener('change', BZ.updateDays);

  // Hour dropdown
  const selHour = document.getElementById('sel-hour');
  const hourLabels = [
    [-1, 'Unknown 不详'],
    [0, '子时 Zi (23:00-00:59)'],  [1, '丑时 Chou (01:00-02:59)'],
    [2, '寅时 Yin (03:00-04:59)'], [3, '卯时 Mao (05:00-06:59)'],
    [4, '辰时 Chen (07:00-08:59)'],[5, '巳时 Si (09:00-10:59)'],
    [6, '午时 Wu (11:00-12:59)'],  [7, '未时 Wei (13:00-14:59)'],
    [8, '申时 Shen (15:00-16:59)'],[9, '酉时 You (17:00-18:59)'],
    [10,'戌时 Xu (19:00-20:59)'],  [11,'亥时 Hai (21:00-22:59)'],
  ];
  for (const [val, label] of hourLabels) {
    const opt = document.createElement('option');
    opt.value = val; opt.textContent = label;
    selHour.appendChild(opt);
  }

  // Gender toggle styling
  document.querySelectorAll('.gender-group input').forEach(inp => {
    inp.addEventListener('change', () => {
      document.querySelectorAll('.gender-group label').forEach(l => {
        l.style.borderColor = '';
        l.style.background = '';
        l.style.color = '';
        l.style.fontWeight = '';
      });
      if (inp.checked) {
        inp.parentElement.style.borderColor = 'var(--accent)';
        inp.parentElement.style.background = 'var(--accent-light)';
        inp.parentElement.style.color = 'var(--accent)';
        inp.parentElement.style.fontWeight = '600';
      }
    });
  });
  // Trigger initial state
  document.querySelector('.gender-group input:checked').dispatchEvent(new Event('change'));
};

BZ.updateDays = function() {
  const y = parseInt(document.getElementById('sel-year').value) || 1990;
  const m = parseInt(document.getElementById('sel-month').value) || 1;
  const maxDay = new Date(y, m, 0).getDate();
  const sel = document.getElementById('sel-day');
  const curVal = parseInt(sel.value) || 1;
  sel.innerHTML = '';
  for (let d = 1; d <= maxDay; d++) {
    const opt = document.createElement('option');
    opt.value = d; opt.textContent = d;
    if (d === Math.min(curVal, maxDay)) opt.selected = true;
    sel.appendChild(opt);
  }
};

BZ.calculate = function() {
  const year = parseInt(document.getElementById('sel-year').value);
  const month = parseInt(document.getElementById('sel-month').value);
  const day = parseInt(document.getElementById('sel-day').value);
  const hourBranch = parseInt(document.getElementById('sel-hour').value);
  const gender = document.querySelector('input[name="gender"]:checked').value;

  if (!year || !month || !day) { alert('Please select a valid date.'); return; }

  // Show loading state
  const btn = document.getElementById('calc-btn');
  btn.textContent = 'Calculating...';
  btn.disabled = true;

  // Use setTimeout to allow UI to update before heavy computation
  setTimeout(() => {
    try {
      const chart = BZ.compute(year, month, day, hourBranch, gender);
      BZ._lastChart = chart;
      BZ.render(chart);
    } catch (e) {
      console.error('BaZi calculation error:', e);
      alert('Calculation error. Please check the date and try again.');
    }
    btn.textContent = 'Calculate 排盘';
    btn.disabled = false;
  }, 50);
};
